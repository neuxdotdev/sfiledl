name: Build

on:
  push:
    branches: master
  pull_request:
    branches: master]
  workflow_call:
    outputs:
      status:
        value: ${{ jobs.build.outputs.status }}

jobs:
  prepare:
    uses: ./.github/workflows/rmcm-install.yml

  build:
    needs: prepare
    runs-on: ubuntu-latest
    outputs:
      status: ${{ job.status }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/rmcm
          key: ${{ runner.os }}-rmcm-v1-${{ hashFiles('.github/workflows/rmcm-install.yml') }}
          restore-keys: ${{ runner.os }}-rmcm-v1-

      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            bun.lock
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - run: command -v rmcm || (cargo install --git https://github.com/neuxdotdev/comment-remover.git --force && echo "$HOME/.cargo/bin" >> $GITHUB_PATH)

      - run: bun install

      - run: bun run rebuild

      - uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: build/
          retention-days: 1
