name: Publish to NPM
'on':
  push:
    branches:
      - main
    tags:
      - v*
  workflow_dispatch: null
jobs:
  check-build:
    uses: ./.github/workflows/build.yml
  publish-npm:
    needs: check-build
    if: github.ref == 'refs/heads/main' && needs.check-build.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: npm-publish
      url: 'https://www.npmjs.com/package/sfiledl'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Setup Rust (for prepublishOnly script)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Restore Caches (Cargo & Bun)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.bun/install/cache
            node_modules
          key: >-
            ${{ runner.os }}-deps-${{ hashFiles('**/bun.lock', '**/Cargo.lock')
            }}
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Add Cargo bin to PATH
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Publish to NPM
        run: bun publish --access public
        env:
          NPM_AUTH_TOKEN: '${{ secrets.NPM_AUTH_TOKEN }}'
