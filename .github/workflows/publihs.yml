name: Publish

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-check:
    uses: ./.github/workflows/build.yml

  publish:
    needs: build-check
    if: |
      (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')) &&
      needs.build-check.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: npm-publish
      url: https://www.npmjs.com/package/sfiledl
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/rmcm
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-publish-${{ hashFiles('bun.lock', '.github/workflows/publish.yml') }}
          restore-keys: |
            ${{ runner.os }}-publish-
            ${{ runner.os }}-

      - run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - run: command -v rmcm || cargo install --git https://github.com/neuxdotdev/comment-remover.git --force

      - run: bun install --frozen-lockfile

      - run: bun publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}