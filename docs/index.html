<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>sfiledl - Documentation</title>
		<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
		<meta
			name="description"
			content="Complete documentation for sfiledl - automated downloader for sfile.co"
		/>
		<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
		<meta name="theme-color" content="#42b983" />
		<link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
		<link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/styles.css" />
		<link
			rel="stylesheet"
			href="//cdn.jsdelivr.net/npm/docsify-zoom-image@1/dist/zoom-image.min.css"
		/>
		<link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-tabs@1/dist/docsify-tabs.css" />
		<style>
			.sidebar {
				padding-top: 0;
			}
			.sidebar-nav li {
				margin: 0;
			}
			.sidebar-nav ul li a {
				font-size: 14px;
				padding: 0.3rem 0;
			}
			.markdown-section {
				max-width: 900px;
				margin: 0 auto;
			}
			.markdown-section p img[alt~='badge'] {
				margin: 0 2px;
			}
			.docsify-darklight-toggle {
				position: fixed;
				bottom: 20px;
				right: 20px;
				z-index: 100;
				background: #fff;
				border-radius: 50%;
				padding: 8px;
				box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
				cursor: pointer;
			}
			@media (prefers-color-scheme: dark) {
				.docsify-darklight-toggle {
					background: #333;
				}
			}
		</style>
		<link rel="preload" href="//cdn.jsdelivr.net/npm/docsify@4" as="script" />
		<link rel="preconnect" href="https://cdn.jsdelivr.net" />
	</head>
	<body>
		<div id="app"></div>
		<script>
			window.$docsify = {
				name: 'sfiledl',
				repo: 'https://github.com/neuxdotdev/sfiledl',
				loadSidebar: true,
				loadNavbar: false,
				coverpage: true,
				auto2top: true,
				mergeNavbar: false,
				maxLevel: 4,
				subMaxLevel: 3,
				relativePath: true,
				routerMode: 'hash',
				homepage: 'README.md',
				plugins: [
					function (hook, vm) {
						hook.doneEach(function () {
							if (typeof ZoomImage !== 'undefined') {
								ZoomImage.init('.markdown-section img:not(.no-zoom)')
							}
						})
					},
				],
				search: {
					maxAge: 86400000,
					paths: 'auto',
					placeholder: 'Search documentation...',
					noData: 'No results found :(',
					depth: 4,
					hideOtherSidebarContent: false,
					namespace: 'sfiledl-search',
				},
				copyCode: { buttonText: 'Copy', errorText: 'Error', successText: 'Copied!' },
				pagination: { previousText: 'Previous', nextText: 'Next' },
				tabs: { persist: true, sync: true, theme: 'classic' },
				darklightToggle: { darkText: '🌙 Dark', lightText: '☀️ Light', default: 'auto' },
				formatUpdated: '{MM}/{DD} {HH}:{mm}',
				alias: { '/.*/_sidebar.md': '/_sidebar.md' },
			}
		</script>
		<script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
		<script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.js"></script>
		<script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
		<script src="//cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
		<script src="//cdn.jsdelivr.net/npm/docsify-zoom-image@1/dist/zoom-image.min.js"></script>
		<script src="//cdn.jsdelivr.net/npm/docsify-tabs@1/dist/docsify-tabs.min.js"></script>
		<script src="//cdn.jsdelivr.net/npm/docsify-darklight-toggle@1/dist/index.min.js"></script>
		<script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/emoji.js"></script>
		<link rel="stylesheet" href="//cdn.jsdelivr.net/npm/prismjs@1/themes/prism-tomorrow.css" />
		<script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
		<script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
		<script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
	</body>
</html>
